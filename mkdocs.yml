site_name: Tentacle
site_description: Unified media library manager for Jellyfin
site_url: https://lucas-romanenko.github.io/jellyfin-tentacle
repo_url: https://github.com/lucas-romanenko/jellyfin-tentacle
repo_name: lucas-romanenko/jellyfin-tentacle

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: images/banner.png
  favicon: images/banner.png

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lucas-romanenko/jellyfin-tentacle

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Setup Wizard: getting-started/setup-wizard.md
    - Docker Compose: getting-started/docker-compose.md
  - Features:
    - VOD Library: features/vod-library.md
    - Live TV: features/live-tv.md
    - Playlists: features/playlists.md
    - Home Screen: features/home-screen.md
    - Discover & Lists: features/discover-and-lists.md
    - Library: features/library.md
    - Activity Tracking: features/activity.md
    - Multi-User: features/multi-user.md
  - Integrations:
    - Jellyfin Plugin: integrations/jellyfin-plugin.md
    - Radarr: integrations/radarr.md
    - Sonarr: integrations/sonarr.md
    - TMDB: integrations/tmdb.md
    - Android TV App: integrations/android-tv.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
