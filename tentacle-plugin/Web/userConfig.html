<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Tentacle Home Screen</title>
</head>
<body>
    <div id="TentacleUserConfigPage" data-role="page" class="page type-interior">
        <div data-role="content">
            <div class="content-primary">
                <h2>Tentacle Home Screen</h2>
                <p>Configure which rows appear on your homepage.</p>
                <div id="rowList" style="margin-top: 1em;"></div>
                <div style="margin-top: 2em;">
                    <button id="btnSaveRows" is="emby-button" class="raised button-submit block">
                        <span>Save</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.querySelector('#TentacleUserConfigPage')
            .addEventListener('pageshow', function () {
                var userId = ApiClient.getCurrentUserId();
                var rowList = document.querySelector('#rowList');
                rowList.innerHTML = 'Loading...';

                ApiClient.getJSON(ApiClient.getUrl('TentacleHome/Sections', { userId: userId }))
                    .then(function (data) {
                        if (!data.enabled || !data.sections || !data.sections.length) {
                            rowList.innerHTML = '<p>No sections configured. Enable Tentacle and run a sync first.</p>';
                            return;
                        }

                        return ApiClient.getJSON(ApiClient.getUrl('TentacleHome/UserSettings', { userId: userId }))
                            .then(function (settings) {
                                var disabled = (settings && settings.DisabledSections) || [];
                                var html = '';
                                data.sections.forEach(function (section) {
                                    var checked = disabled.indexOf(section.id) === -1 ? 'checked' : '';
                                    html += '<div class="checkboxContainer" style="margin-bottom: 0.5em;">' +
                                        '<label><input type="checkbox" is="emby-checkbox" data-section-id="' +
                                        section.id + '" ' + checked + ' />' +
                                        '<span>' + section.displayText + ' (' + section.type + ')</span></label></div>';
                                });
                                rowList.innerHTML = html;
                            });
                    })
                    .catch(function () {
                        rowList.innerHTML = '<p>Failed to load sections.</p>';
                    });
            });

        document.querySelector('#btnSaveRows')
            .addEventListener('click', function () {
                var userId = ApiClient.getCurrentUserId();
                var checkboxes = document.querySelectorAll('#rowList input[type="checkbox"]');
                var disabled = [];
                checkboxes.forEach(function (cb) {
                    if (!cb.checked) {
                        disabled.push(cb.dataset.sectionId);
                    }
                });

                ApiClient.ajax({
                    url: ApiClient.getUrl('TentacleHome/UserSettings'),
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        UserId: userId,
                        EnabledSections: [],
                        DisabledSections: disabled
                    })
                }).then(function () {
                    Dashboard.alert('Saved!');
                }).catch(function () {
                    Dashboard.alert('Failed to save settings.');
                });
            });
    </script>
</body>
</html>
