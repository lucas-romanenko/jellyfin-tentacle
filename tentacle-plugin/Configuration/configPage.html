<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Tentacle Configuration</title>
</head>
<body>
    <div id="TentacleConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <h2>Tentacle</h2>
                <form id="TentacleConfigForm">
                    <div class="inputContainer">
                        <label class="inputLabel" for="txtTentacleUrl">Tentacle URL</label>
                        <input id="txtTentacleUrl" type="text" is="emby-input"
                               placeholder="http://192.168.1.100:8888" />
                        <div class="fieldDescription">The URL where your Tentacle dashboard is running (e.g. <code>http://192.168.1.100:8888</code>). The plugin uses this to fetch home screen layout and playlist data.</div>
                    </div>

                    <div style="margin-top: 1em; display: flex; gap: 1em; align-items: center; flex-wrap: wrap;">
                        <button is="emby-button" type="submit" class="raised button-submit">
                            <span>Save</span>
                        </button>
                        <button id="btnTestConnection" type="button" is="emby-button" class="raised">
                            Test Connection
                        </button>
                        <span id="saveResult" style="font-size: 14px;"></span>
                    </div>
                </form>

                <div id="statusInfo" style="margin-top: 1.5em; display: none; padding: 1em; background: rgba(255,255,255,0.05); border-radius: 8px;">
                    <h3 style="margin: 0 0 0.5em 0;">Tentacle Status</h3>
                    <div id="statusDetails" style="font-size: 14px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        var TentacleConfig = {
            pluginUniqueId: 'b7e3f1a9-2c4d-4856-9a1b-8def23456789'
        };

        function showMessage(text, color) {
            var el = document.querySelector('#saveResult');
            el.innerHTML = '<span style="color:' + color + '">' + text + '</span>';
            setTimeout(function () { el.innerHTML = ''; }, 5000);
        }

        document.querySelector('#TentacleConfigPage')
            .addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(TentacleConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#txtTentacleUrl').value = config.TentacleUrl || '';
                    Dashboard.hideLoadingMsg();
                });
            });

        document.querySelector('#TentacleConfigForm')
            .addEventListener('submit', function (e) {
                e.preventDefault();
                var url = document.querySelector('#txtTentacleUrl').value.trim();
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(TentacleConfig.pluginUniqueId).then(function (config) {
                    config.TentacleUrl = url;
                    ApiClient.updatePluginConfiguration(TentacleConfig.pluginUniqueId, config).then(function () {
                        Dashboard.hideLoadingMsg();
                        if (url) {
                            showMessage('Saved! URL: ' + url, '#4f4');
                        } else {
                            showMessage('Saved. No URL set — plugin is inactive.', '#fa0');
                        }
                    });
                });
                return false;
            });

        document.querySelector('#btnTestConnection')
            .addEventListener('click', function () {
                var url = document.querySelector('#txtTentacleUrl').value.trim();
                var statusEl = document.querySelector('#statusInfo');
                var detailsEl = document.querySelector('#statusDetails');

                if (!url) {
                    showMessage('Enter a Tentacle URL first.', '#f44');
                    return;
                }

                showMessage('Testing...', '#aaa');
                statusEl.style.display = 'none';

                var testUrl = url.replace(/\/+$/, '') + '/api/widget/status';
                fetch(testUrl)
                    .then(function (resp) {
                        if (!resp.ok) throw new Error('HTTP ' + resp.status);
                        return resp.json();
                    })
                    .then(function (data) {
                        showMessage('Connected!', '#4f4');
                        statusEl.style.display = 'block';
                        detailsEl.innerHTML =
                            '<div>Movies: <strong>' + (data.total_movies || 0) + '</strong></div>' +
                            '<div>Series: <strong>' + (data.total_series || 0) + '</strong></div>' +
                            '<div>Last Sync: ' + (data.last_sync || 'Never') + '</div>';
                    })
                    .catch(function (err) {
                        showMessage('Connection failed: ' + err.message, '#f44');
                        statusEl.style.display = 'none';
                    });
            });
    </script>
</body>
</html>
